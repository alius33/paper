name: Auto-merge Claude Code PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    # Only run on branches created by Claude Code
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable auto-merge
        run: gh pr merge "$PR_URL" --merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
